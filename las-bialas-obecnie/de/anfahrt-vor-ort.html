<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Moderne und komfortable Ferienhäuser mit Sauna in Biała, gelegen im Herzen des Netze-Urwald in Polen, direkt am Weißen See." />
    <title>Lage und Anfahrt zu den Ferienhäusern, Las Biala's</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Oxanium', sans-serif;
        }

        .top-bar {
            background-color: #41A55B;
            color: white;
            height: 44px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: sticky;
            top: 0;
            padding: 0 10px;
            font-size: 16px;
            z-index: 1000;
        }

        .top-bar h1 {
            margin: 0;
            font-weight: 400;
            font-size: 20px;
            text-align: center;
        }

        .contact-info {
            position: absolute;
            right: 10px;
            display: flex;
            gap: 20px;
            font-size: 16px;
        }

        .contact-info a {
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .language-links {
            display: flex;
            gap: 10px;
            margin-right: 20px;
            align-items: center;
        }

        .language-links .lang-link {
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.85rem;
            text-decoration: none;
            width: 30px;
            height: 30px;
            border: 1px solid white;
            border-radius: 50%;
        }

        .footer {
            background-color: #737373;
            color: white;
            height: 44px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            width: 100%;
        }

        .main-image {
            width: 100%;
            height: auto;
            display: block;
        }

        @media (max-width: 768px) {
            .contact-info {
                display: none;
            }
            
            .hamburger-menu {
                display: block;
                position: absolute;
                right: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <h1>Anfahrt zu den Ferienhäusern, Las Biala's</h1>
        <div class="contact-info">
            <a href="tel:+48789773285">
                <img src="/images/telefon.png" alt="Telefon" style="width: 30px; height: 30px;">+48 789 773 285
            </a>
            <a href="mailto:info@lasbialas.pl">
                <img src="/images/mail.png" alt="Mail" style="width: 30px; height: 30px;">info@lasbialas.pl
            </a>
            <div class="language-links">
                <a href="/" class="lang-link">PL</a>
            </div>
        </div>
    </div>

    <img src="/de/foto/anfahrt-vor-ort-LB.webp" alt="droga dojazdu do domków Las Biala's" class="main-image" width="1920" height="1125">

    <div class="footer">
        <p>&copy; <span id="year"></span> Las Biala's</p>
    </div>

    <script>
        document.getElementById('year').innerText = new Date().getFullYear();
    </script>
</body>
</html>
